<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedido confirmado — Pássaro Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0a0a0a;color:#f2f2f2;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:clamp(32px,6vw,60px);max-width:480px;width:100%;text-align:center}
.emoji{font-size:3.5rem;margin-bottom:20px}
h1{font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:12px}
p{color:#8a8a8a;font-size:0.9rem;line-height:1.7;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;justify-content:center;background:#D4AF37;color:#000;font-family:inherit;font-size:0.9rem;font-weight:800;border:none;border-radius:100px;padding:14px 32px;cursor:pointer;text-decoration:none;transition:all .25s}
.btn:hover{background:#e8c84a;transform:translateY(-2px)}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🎉</div>
  <h1>Pedido confirmado!</h1>
  <p>Obrigado pela sua compra. Você receberá a confirmação no e-mail cadastrado em breve. Em caso de dúvidas, entre em contato conosco.</p>
  <a href="/" class="btn">← Voltar ao início</a>
</div>
</body>
</html>
